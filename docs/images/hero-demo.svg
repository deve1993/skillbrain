<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="SkillBrain demo — session_resume on Quickfy">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <style>
      .mono { font-family: "SFMono-Regular", "JetBrains Mono", Menlo, Consolas, monospace; }
      .title { font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif; font-weight: 600; fill: #cbd5e1; }
    </style>
  </defs>

  <!-- Window -->
  <rect width="900" height="520" rx="14" fill="url(#bg)"/>
  <rect x="0" y="0" width="900" height="38" rx="14" fill="#1e293b"/>
  <rect x="0" y="24" width="900" height="14" fill="#1e293b"/>

  <!-- Traffic lights -->
  <circle cx="24" cy="19" r="6" fill="#ef4444"/>
  <circle cx="44" cy="19" r="6" fill="#f59e0b"/>
  <circle cx="64" cy="19" r="6" fill="#22c55e"/>

  <!-- Window title -->
  <text x="450" y="24" text-anchor="middle" class="title" font-size="13">skillbrain — session_resume</text>

  <!-- Terminal body -->
  <g class="mono" font-size="14">
    <!-- Prompt line -->
    <text x="24" y="76" fill="#8b5cf6">$</text>
    <text x="42" y="76" fill="#e2e8f0">claude</text>
    <text x="112" y="76" fill="#06b6d4">session_resume</text>
    <text x="248" y="76" fill="#94a3b8">(</text>
    <text x="256" y="76" fill="#f59e0b">{ project: </text>
    <text x="346" y="76" fill="#34d399">"Quickfy"</text>
    <text x="416" y="76" fill="#f59e0b"> }</text>
    <text x="432" y="76" fill="#94a3b8">)</text>

    <!-- Output header -->
    <text x="24" y="112" fill="#a78bfa" font-weight="700">## Resume Context: Quickfy</text>

    <text x="24" y="144" fill="#f472b6" font-weight="700">### Last Session</text>
    <text x="24" y="168" fill="#cbd5e1">- Date:        </text>
    <text x="170" y="168" fill="#e2e8f0">2026-04-22</text>
    <text x="24" y="188" fill="#cbd5e1">- Task:        </text>
    <text x="170" y="188" fill="#e2e8f0">add stripe payments</text>
    <text x="24" y="208" fill="#cbd5e1">- Status:      </text>
    <text x="170" y="208" fill="#f59e0b">paused</text>
    <text x="24" y="228" fill="#cbd5e1">- Next steps:  </text>
    <text x="170" y="228" fill="#e2e8f0">subscription renewals + account page</text>
    <text x="24" y="248" fill="#cbd5e1">- Branch:      </text>
    <text x="170" y="248" fill="#34d399">feat/payments</text>
    <text x="24" y="268" fill="#cbd5e1">- Commits:     </text>
    <text x="170" y="268" fill="#94a3b8">abc123, def456</text>

    <text x="24" y="304" fill="#f472b6" font-weight="700">### Team Memories (shared · scope=team)</text>

    <!-- Memory 1 -->
    <rect x="24" y="320" width="852" height="52" rx="8" fill="#0f172a" stroke="#1f2a44"/>
    <text x="40" y="342" fill="#ef4444" font-weight="700">[BugFix conf:3]</text>
    <text x="190" y="342" fill="#94a3b8">@alice · 2026-04-20</text>
    <text x="40" y="362" fill="#e2e8f0">"Multi-tenant Payload: every collection MUST have access control fns → else data leak."</text>

    <!-- Memory 2 -->
    <rect x="24" y="382" width="852" height="52" rx="8" fill="#0f172a" stroke="#1f2a44"/>
    <text x="40" y="404" fill="#06b6d4" font-weight="700">[Pattern conf:3]</text>
    <text x="190" y="404" fill="#94a3b8">@bob · 2026-04-22</text>
    <text x="40" y="424" fill="#e2e8f0">"Centralize Payload Local API calls in lib/payload.ts → avoid duplicate cookie forward."</text>

    <!-- Memory 3 -->
    <rect x="24" y="444" width="852" height="52" rx="8" fill="#0f172a" stroke="#1f2a44"/>
    <text x="40" y="466" fill="#f59e0b" font-weight="700">[Decision conf:2]</text>
    <text x="190" y="466" fill="#94a3b8">@you · 2026-04-15</text>
    <text x="40" y="486" fill="#e2e8f0">"Stripe prices live as Price IDs in ENV — never hardcoded in components."</text>
  </g>
</svg>
