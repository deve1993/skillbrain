<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-label="SkillBrain animated demo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <style>
      .mono { font-family: "SFMono-Regular", "JetBrains Mono", Menlo, Consolas, monospace; }
      .sans { font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif; }
    </style>
  </defs>

  <!-- Window chrome -->
  <rect width="920" height="560" rx="14" fill="url(#bg)"/>
  <rect x="0" y="0" width="920" height="38" rx="14" fill="#1e293b"/>
  <rect x="0" y="24" width="920" height="14" fill="#1e293b"/>
  <circle cx="24" cy="19" r="6" fill="#ef4444"/>
  <circle cx="44" cy="19" r="6" fill="#f59e0b"/>
  <circle cx="64" cy="19" r="6" fill="#22c55e"/>

  <!-- Dynamic title -->
  <text x="460" y="24" text-anchor="middle" class="sans" font-size="13" fill="#cbd5e1">
    <tspan>skillbrain · live demo</tspan>
    <animate attributeName="opacity" values="1;1;1" dur="18s" repeatCount="indefinite"/>
  </text>

  <!-- Blinking cursor reused across scenes -->
  <g font-size="14" class="mono">

    <!-- ──────────────────────── SCENE 1: session_resume (0s → 6s) ──────────────────────── -->
    <g>
      <animate attributeName="opacity" values="0;1;1;1;0;0;0" keyTimes="0;0.02;0.05;0.33;0.36;0.66;1" dur="18s" repeatCount="indefinite"/>

      <text x="24" y="78" fill="#8b5cf6">$</text>
      <text x="42" y="78" fill="#e2e8f0">claude</text>

      <!-- Typing effect on command -->
      <text x="112" y="78" fill="#06b6d4">
        <tspan>
          <animate attributeName="textLength" values="0;200" dur="1.1s" begin="0s" fill="freeze"/>
        </tspan>session_resume({ project: "Quickfy" })</text>

      <!-- Output appears after typing -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.08;0.12;1" dur="18s" repeatCount="indefinite"/>

        <text x="24" y="116" fill="#a78bfa" font-weight="700">## Resume Context: Quickfy</text>

        <text x="24" y="150" fill="#f472b6" font-weight="700">### Last Session</text>
        <text x="24" y="174" fill="#cbd5e1">- Date:       </text><text x="170" y="174" fill="#e2e8f0">2026-04-22</text>
        <text x="24" y="194" fill="#cbd5e1">- Task:       </text><text x="170" y="194" fill="#e2e8f0">add stripe payments</text>
        <text x="24" y="214" fill="#cbd5e1">- Status:     </text><text x="170" y="214" fill="#f59e0b">paused</text>
        <text x="24" y="234" fill="#cbd5e1">- Next steps: </text><text x="170" y="234" fill="#e2e8f0">subscription renewals + account page</text>
        <text x="24" y="254" fill="#cbd5e1">- Branch:     </text><text x="170" y="254" fill="#34d399">feat/payments</text>

        <text x="24" y="294" fill="#f472b6" font-weight="700">### Team Memories (scope=team)</text>

        <rect x="24" y="308" width="872" height="52" rx="8" fill="#0f172a" stroke="#1f2a44"/>
        <text x="40" y="330" fill="#ef4444" font-weight="700">[BugFix conf:3]</text>
        <text x="190" y="330" fill="#94a3b8">@alice · 2026-04-20</text>
        <text x="40" y="350" fill="#e2e8f0">"Multi-tenant Payload: every collection MUST have access control fns."</text>

        <rect x="24" y="370" width="872" height="52" rx="8" fill="#0f172a" stroke="#1f2a44"/>
        <text x="40" y="392" fill="#06b6d4" font-weight="700">[Pattern conf:3]</text>
        <text x="190" y="392" fill="#94a3b8">@bob · 2026-04-22</text>
        <text x="40" y="412" fill="#e2e8f0">"Centralize Payload Local API calls in lib/payload.ts — no dup cookies."</text>

        <rect x="24" y="432" width="872" height="52" rx="8" fill="#0f172a" stroke="#1f2a44"/>
        <text x="40" y="454" fill="#f59e0b" font-weight="700">[Decision conf:2]</text>
        <text x="190" y="454" fill="#94a3b8">@you · 2026-04-15</text>
        <text x="40" y="474" fill="#e2e8f0">"Stripe Price IDs in ENV only — never hardcoded in components."</text>
      </g>
    </g>

    <!-- ──────────────────────── SCENE 2: skill_route (6s → 12s) ──────────────────────── -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;1;1;1;0;0" keyTimes="0;0.32;0.34;0.36;0.38;0.5;0.64;0.67;1" dur="18s" repeatCount="indefinite"/>

      <text x="24" y="78" fill="#8b5cf6">$</text>
      <text x="42" y="78" fill="#e2e8f0">claude</text>
      <text x="112" y="78" fill="#06b6d4">skill_route({ task: "add stripe payments" })</text>

      <text x="24" y="120" fill="#a78bfa" font-weight="700">## Recommended skills (ranked)</text>

      <!-- Skill cards -->
      <g>
        <rect x="24" y="142" width="872" height="60" rx="10" fill="#0f172a" stroke="#1e3a8a"/>
        <text x="44" y="166" fill="#34d399" font-weight="700" font-size="15">payments</text>
        <text x="44" y="186" fill="#94a3b8">494 lines · checkout · webhooks · subscriptions · error handling</text>
        <text x="856" y="166" fill="#fbbf24" text-anchor="end" font-weight="700">★ 0.94</text>
      </g>
      <g>
        <rect x="24" y="212" width="872" height="60" rx="10" fill="#0f172a" stroke="#1f2a44"/>
        <text x="44" y="236" fill="#34d399" font-weight="700" font-size="15">churn-prevention</text>
        <text x="44" y="256" fill="#94a3b8">241 lines · retention · dunning · grace periods</text>
        <text x="856" y="236" fill="#fbbf24" text-anchor="end" font-weight="700">★ 0.71</text>
      </g>
      <g>
        <rect x="24" y="282" width="872" height="60" rx="10" fill="#0f172a" stroke="#1f2a44"/>
        <text x="44" y="306" fill="#34d399" font-weight="700" font-size="15">pricing-strategy</text>
        <text x="44" y="326" fill="#94a3b8">232 lines · tiers · anchoring · SaaS psychology</text>
        <text x="856" y="306" fill="#fbbf24" text-anchor="end" font-weight="700">★ 0.63</text>
      </g>

      <!-- Follow-up command -->
      <text x="24" y="378" fill="#8b5cf6">$</text>
      <text x="42" y="378" fill="#e2e8f0">claude</text>
      <text x="112" y="378" fill="#06b6d4">skill_read({ name: "payments" })</text>

      <text x="24" y="410" fill="#cbd5e1">→ Stripe integration guide loaded into context</text>
      <text x="24" y="430" fill="#94a3b8">   sections: Setup, Checkout, Webhooks, Subscriptions, Errors</text>
    </g>

    <!-- ──────────────────────── SCENE 3: memory_query team (12s → 18s) ──────────────────────── -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;0;0;1;1;1" keyTimes="0;0.32;0.34;0.36;0.38;0.65;0.68;0.98;1" dur="18s" repeatCount="indefinite"/>

      <text x="24" y="78" fill="#8b5cf6">$</text>
      <text x="42" y="78" fill="#e2e8f0">claude</text>
      <text x="112" y="78" fill="#06b6d4">memory_query({ scope: "team", type: "BugFix", limit: 3 })</text>

      <text x="24" y="118" fill="#a78bfa" font-weight="700">## Shared team knowledge · 128 memories · 3 shown</text>

      <!-- Author avatars + memories -->
      <g>
        <rect x="24" y="140" width="872" height="86" rx="10" fill="#0f172a" stroke="#1f2a44"/>
        <circle cx="56" cy="172" r="18" fill="#8b5cf6"/>
        <text x="56" y="178" text-anchor="middle" class="sans" fill="#fff" font-weight="700" font-size="14">A</text>
        <text x="90" y="164" fill="#e2e8f0" font-weight="700">alice</text>
        <text x="140" y="164" fill="#94a3b8">·  memory-bugfix-7c2</text>
        <text x="820" y="164" fill="#ef4444" text-anchor="end" font-weight="700">conf 3/3</text>
        <text x="90" y="186" fill="#cbd5e1">Coolify healthchecks fail during slow SQL migrations.</text>
        <text x="90" y="206" fill="#cbd5e1">→ Set start_period to 90s in docker-compose.yml.</text>
      </g>

      <g>
        <rect x="24" y="236" width="872" height="86" rx="10" fill="#0f172a" stroke="#1f2a44"/>
        <circle cx="56" cy="268" r="18" fill="#06b6d4"/>
        <text x="56" y="274" text-anchor="middle" class="sans" fill="#fff" font-weight="700" font-size="14">B</text>
        <text x="90" y="260" fill="#e2e8f0" font-weight="700">bob</text>
        <text x="140" y="260" fill="#94a3b8">·  memory-bugfix-f4a</text>
        <text x="820" y="260" fill="#ef4444" text-anchor="end" font-weight="700">conf 3/3</text>
        <text x="90" y="282" fill="#cbd5e1">Cookie forwarding in Server Actions needs explicit headers().</text>
        <text x="90" y="302" fill="#cbd5e1">→ Use cookies().getAll() and forward in fetch() options.</text>
      </g>

      <g>
        <rect x="24" y="332" width="872" height="86" rx="10" fill="#0f172a" stroke="#1f2a44"/>
        <circle cx="56" cy="364" r="18" fill="#f59e0b"/>
        <text x="56" y="370" text-anchor="middle" class="sans" fill="#fff" font-weight="700" font-size="14">C</text>
        <text x="90" y="356" fill="#e2e8f0" font-weight="700">carol</text>
        <text x="140" y="356" fill="#94a3b8">·  memory-bugfix-9d1</text>
        <text x="820" y="356" fill="#ef4444" text-anchor="end" font-weight="700">conf 2/3</text>
        <text x="90" y="378" fill="#cbd5e1">next-intl middleware must run BEFORE auth middleware.</text>
        <text x="90" y="398" fill="#cbd5e1">→ Order matters: i18n → auth → route handlers.</text>
      </g>

      <text x="24" y="450" fill="#34d399">✓ found 3 memories · saved 48min of rediscovery</text>
      <text x="24" y="472" fill="#94a3b8" font-size="12">shared with: 4 team members · audit logged</text>
    </g>

    <!-- Blinking cursor (always visible at prompt) -->
    <rect x="740" y="66" width="9" height="16" fill="#e2e8f0">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Scene indicator dots -->
  <g transform="translate(420,530)">
    <circle cx="0" cy="0" r="4" fill="#475569">
      <animate attributeName="fill" values="#34d399;#475569;#475569;#34d399" keyTimes="0;0.34;0.68;1" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="0" r="4" fill="#475569">
      <animate attributeName="fill" values="#475569;#34d399;#475569;#475569" keyTimes="0;0.34;0.67;1" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="0" r="4" fill="#475569">
      <animate attributeName="fill" values="#475569;#475569;#34d399;#475569" keyTimes="0;0.34;0.68;1" dur="18s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
