<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Design System Studio — Synapse</title>
<style>
/* Match the main app dark theme */
:root {
  --bg: #08080d; --card: #0e0e16; --border: #1a1a2a; --border-hover: #2a2a4a;
  --text: #d0d0d0; --text-dim: #777; --text-muted: #444;
  --accent: #a78bfa; --accent2: #6366f1; --green: #34d399; --red: #f87171;
  --surface: #12121e; --font: 'Inter', -apple-system, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box }
body { font-family:var(--font); background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; font-size:13px }

/* Layout */
#left  { width:280px; flex-shrink:0; overflow-y:auto; border-right:1px solid var(--border); display:flex; flex-direction:column }
#right { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px }

/* Left sections */
.l-section { padding:14px 16px; border-bottom:1px solid var(--border) }
.l-label { font-size:10px; font-weight:600; letter-spacing:.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:10px }

/* DS selector bar */
#ds-bar { display:flex; align-items:center; gap:8px; padding:10px 16px; border-bottom:1px solid var(--border) }
#ds-select { flex:1; background:var(--card); border:1px solid var(--border); border-radius:6px; color:var(--text); padding:5px 8px; font-size:12px }

/* Inputs */
textarea, .text-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:6px; color:var(--text); padding:8px; font-size:12px; font-family:var(--font) }
textarea { resize:vertical }

/* Buttons */
.btn-primary { background:var(--accent2); color:#fff; border:none; border-radius:6px; padding:7px 14px; font-size:12px; cursor:pointer; width:100%; margin-top:8px }
.btn-primary:disabled { opacity:.5; cursor:default }
.btn-sm { background:var(--card); border:1px solid var(--border); color:var(--text); border-radius:5px; padding:5px 10px; font-size:11px; cursor:pointer }
.btn-sm:hover { border-color:var(--accent) }
.btn-row { display:flex; flex-wrap:wrap; gap:6px }

/* Token sections */
.token-section { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px }
.token-section h3 { font-size:11px; font-weight:600; letter-spacing:.06em; color:var(--text-muted); text-transform:uppercase; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center }

/* Color rows */
.color-row { display:flex; align-items:center; gap:8px; margin-bottom:6px }
.color-row input[type=color] { width:32px; height:28px; border:none; border-radius:4px; cursor:pointer; padding:0; background:none }
.color-name { flex:1; font-size:12px; color:var(--text-dim) }
.color-hex { width:90px; background:var(--surface); border:1px solid var(--border); border-radius:4px; color:var(--text); padding:3px 6px; font-size:11px; font-family:monospace }
.del-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:16px; line-height:1 }
.del-btn:hover { color:var(--red) }

/* Token grid */
.token-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px }
.token-row { display:flex; flex-direction:column; gap:2px }
.token-row label { font-size:10px; color:var(--text-dim) }
.token-row input { background:var(--surface); border:1px solid var(--border); border-radius:4px; color:var(--text); padding:4px 7px; font-size:12px }

/* Preview */
#preview-section { background:var(--card); border:1px solid var(--border); border-radius:8px; overflow:hidden }
.preview-header { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between }
.preview-header-left { font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em }
.preview-header-right { font-size:11px; color:var(--text-dim); display:flex; align-items:center; gap:4px; cursor:pointer }
#preview-frame { width:100%; height:280px; border:none; background:#fff }

/* Save bar */
#save-bar { display:flex; gap:8px; align-items:center }
#save-bar .text-input { flex:1 }
#save-btn { background:var(--green); color:#000; border:none; border-radius:6px; padding:7px 18px; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap }
#save-btn:disabled { opacity:.5; cursor:default }

/* Status */
#status { font-size:11px; color:var(--text-dim); text-align:center; padding:10px 16px; min-height:16px }
.status-ok { color:var(--green) }
.status-err { color:var(--red) }

/* Import overlay */
#import-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; align-items:center; justify-content:center }
#import-overlay.open { display:flex }
.import-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; width:520px; max-width:90vw; display:flex; flex-direction:column; gap:10px }
.import-box h2 { font-size:14px }
.import-box textarea { height:160px }
.import-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:4px }
.btn-cancel { background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:6px 14px; font-size:12px; cursor:pointer }
.btn-import { background:var(--accent2); color:#fff; border:none; border-radius:6px; padding:6px 14px; font-size:12px; cursor:pointer }

/* Palette shade grid */
.shade-group { margin-bottom:10px }
.shade-group-name { font-size:11px; font-weight:600; color:var(--text-dim); margin-bottom:5px; display:flex; align-items:center; gap:6px }
.shade-grid { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:4px }
.shade-cell { display:flex; flex-direction:column; align-items:center; gap:2px }
.shade-cell input[type=color] { width:36px; height:30px; border:none; border-radius:4px; cursor:pointer; padding:0; background:none }
.shade-cell span { font-size:9px; color:var(--text-muted) }
.del-group-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:13px; margin-left:auto }
.del-group-btn:hover { color:var(--red) }

/* Semantic color rows */
.sem-category { margin-bottom:10px }
.sem-cat-name { font-size:11px; font-weight:600; color:var(--text-dim); margin-bottom:5px }

/* Shadow rows */
.shadow-row { display:flex; align-items:center; gap:8px; margin-bottom:6px }
.shadow-name { width:70px; font-size:12px; color:var(--text-dim) }
.shadow-value { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:4px; color:var(--text); padding:3px 7px; font-size:11px; font-family:monospace }
.shadow-preview { width:60px; height:24px; background:var(--card); border-radius:4px }

/* Typography scale rows */
.scale-row { display:grid; grid-template-columns:48px 1fr 1fr; gap:4px; align-items:center; margin-bottom:4px }
.scale-step { font-size:11px; color:var(--text-dim) }

/* Effects rows */
.effect-row { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:10px; margin-bottom:8px }
.effect-name { font-size:11px; font-weight:600; color:var(--text-dim); margin-bottom:6px }
.effect-row select { background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:4px; padding:3px 7px; font-size:11px; width:100%; margin-bottom:6px }
.effect-row textarea { height:48px; font-size:11px; font-family:monospace }

/* Component token grid */
.comp-group { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:10px; margin-bottom:8px }
.comp-group-name { font-size:11px; font-weight:600; color:var(--text-dim); margin-bottom:6px }

/* Assets section */
.asset-row { display:flex; flex-direction:column; gap:2px; margin-bottom:8px }
.asset-row label { font-size:10px; color:var(--text-dim) }
.asset-row input { background:var(--surface); border:1px solid var(--border); border-radius:4px; color:var(--text); padding:4px 7px; font-size:12px }

/* Collapsible token sections */
details.token-section summary { list-style:none; outline:none }
details.token-section summary::-webkit-details-marker { display:none }
details.token-section summary h3 { cursor:pointer }
details.token-section summary h3::before { content:'▸ '; font-size:9px; color:var(--text-muted) }
details.token-section[open] summary h3::before { content:'▾ '; font-size:9px }
</style>
</head>
<body>

<div id="left">
  <div id="ds-bar">
    <select id="ds-select"><option value="">— New DS —</option></select>
    <button class="btn-sm" onclick="newDs()">+ New</button>
  </div>

  <div class="l-section">
    <div class="l-label">Generate with AI</div>
    <textarea id="brief" rows="4" placeholder="Dark SaaS, purple accent, Inter, minimal and modern…"></textarea>
    <button class="btn-primary" id="gen-btn" onclick="generate()">▸ Generate Design System</button>
  </div>

  <div class="l-section">
    <div class="l-label">Import</div>
    <div class="btn-row">
      <button class="btn-sm" onclick="openImport('json')">JSON tokens</button>
      <button class="btn-sm" onclick="openImport('css')">CSS vars</button>
      <button class="btn-sm" onclick="openImport('tailwind')">Tailwind</button>
      <button class="btn-sm" onclick="openImport('figma')">Figma</button>
    </div>
  </div>

  <div class="l-section">
    <div class="l-label">Export</div>
    <div class="btn-row">
      <button class="btn-sm" onclick="exportDs('css')">CSS vars</button>
      <button class="btn-sm" onclick="exportDs('json')">JSON tokens</button>
      <button class="btn-sm" onclick="exportDs('tailwind')">Tailwind</button>
    </div>
  </div>

  <div style="flex:1"></div>
  <div id="status"></div>
</div>

<div id="right">
  <div class="token-section" id="colors-section">
    <h3>Colors <button class="btn-sm" onclick="addColor()" style="font-size:10px;padding:3px 8px">+ Add</button></h3>
    <div id="colors-list"></div>
  </div>

  <div class="token-section">
    <h3>Typography</h3>
    <div class="token-grid" id="fonts-grid"></div>
  </div>

  <div class="token-section">
    <h3>Spacing Scale</h3>
    <div class="token-grid" id="spacing-grid"></div>
  </div>

  <div class="token-section">
    <h3>Border Radius</h3>
    <div class="token-grid" id="radius-grid"></div>
  </div>

  <details class="token-section" id="palette-section">
    <summary style="cursor:pointer;user-select:none">
      <h3 style="display:inline-flex;gap:8px;align-items:center">
        Color Palette
        <button class="btn-sm" onclick="event.preventDefault();addPaletteGroup()" style="font-size:10px;padding:3px 8px">+ Group</button>
      </h3>
    </summary>
    <div id="palette-list" style="margin-top:10px"></div>
  </details>

  <details class="token-section" id="semantic-section">
    <summary style="cursor:pointer;user-select:none"><h3>Semantic Colors</h3></summary>
    <div id="semantic-list" style="margin-top:10px"></div>
  </details>

  <details class="token-section" id="shadows-section">
    <summary style="cursor:pointer;user-select:none">
      <h3 style="display:inline-flex;gap:8px;align-items:center">
        Shadows
        <button class="btn-sm" onclick="event.preventDefault();addShadow()" style="font-size:10px;padding:3px 8px">+ Add</button>
      </h3>
    </summary>
    <div id="shadows-list" style="margin-top:10px"></div>
  </details>

  <details class="token-section" id="typography-section">
    <summary style="cursor:pointer;user-select:none"><h3>Typography</h3></summary>
    <div style="margin-top:10px">
      <div class="l-label" style="margin-bottom:8px">Font Families</div>
      <div class="token-grid" id="typo-families-grid"></div>
      <div class="l-label" style="margin:12px 0 8px">Type Scale</div>
      <div id="typo-scale-list"></div>
      <div class="l-label" style="margin:12px 0 8px">Font Weights</div>
      <div class="token-grid" id="typo-weights-grid"></div>
    </div>
  </details>

  <details class="token-section" id="effects-section">
    <summary style="cursor:pointer;user-select:none"><h3>Effects</h3></summary>
    <div id="effects-list" style="margin-top:10px"></div>
  </details>

  <details class="token-section" id="components-section">
    <summary style="cursor:pointer;user-select:none"><h3>Component Tokens</h3></summary>
    <div id="components-list" style="margin-top:10px"></div>
  </details>

  <details class="token-section" id="assets-section">
    <summary style="cursor:pointer;user-select:none"><h3>Assets</h3></summary>
    <div style="margin-top:10px">
      <div class="asset-row">
        <label>Logo URL</label>
        <input id="asset-logoUrl" type="url" placeholder="https://…/logo.svg">
      </div>
      <div class="asset-row">
        <label>Logo Wordmark URL</label>
        <input id="asset-logoWordmark" type="url" placeholder="https://…/wordmark.svg">
      </div>
      <div class="asset-row">
        <label>Icon Library</label>
        <input id="asset-iconLibrary" type="text" placeholder="lucide">
      </div>
    </div>
  </details>

  <div id="preview-section">
    <div class="preview-header">
      <span class="preview-header-left">Preview</span>
      <label class="preview-header-right">
        <input type="checkbox" id="dark-mode-toggle" onchange="toggleDarkMode()"> Dark mode
      </label>
    </div>
    <iframe id="preview-frame" sandbox="allow-scripts" title="Design System Preview"></iframe>
  </div>

  <div id="save-bar">
    <input id="project-input" class="text-input" placeholder="Project name (e.g. my-saas)" type="text">
    <button id="save-btn" onclick="saveDs()">Save DS</button>
  </div>
</div>

<!-- Import overlay -->
<div id="import-overlay">
  <div class="import-box">
    <h2 id="import-title">Import</h2>
    <input type="text" id="import-figma-url" class="text-input" placeholder="Figma file URL" style="display:none">
    <input type="text" id="import-figma-token" class="text-input" placeholder="Figma access token (optional if FIGMA_TOKEN env set)" style="display:none">
    <textarea id="import-text" placeholder="Paste content here…"></textarea>
    <div class="import-footer">
      <button class="btn-cancel" onclick="closeImport()">Cancel</button>
      <button class="btn-import" onclick="runImport()">Import</button>
    </div>
  </div>
</div>

<script type="module" src="/ds-studio/ds-studio.js"></script>
</body>
</html>
