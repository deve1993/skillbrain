<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SkillBrain Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav id="sidebar">
    <div class="logo">
      <h1>SkillBrain</h1>
      <span class="status-dot"></span>
    </div>
    <a href="#/" class="nav-item active" data-page="home">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
      Home
    </a>
    <a href="#/projects" class="nav-item" data-page="projects">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span>
      Projects
    </a>
    <a href="#/worklog" class="nav-item" data-page="worklog">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>
      Work Log
    </a>
    <a href="#/skills" class="nav-item" data-page="skills">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span>
      Skills
    </a>
    <a href="#/memories" class="nav-item" data-page="memories">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-1.07-4.54A2.5 2.5 0 0 1 6.5 9.5a2.5 2.5 0 0 1 0-5 2.5 2.5 0 0 1 3-2.48z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 1.07-4.54A2.5 2.5 0 0 0 17.5 9.5a2.5 2.5 0 0 0 0-5 2.5 2.5 0 0 0-3-2.48z"/></svg></span>
      Memory
    </a>
    <a href="#/sessions" class="nav-item" data-page="sessions">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
      Sessions
    </a>
    <a href="#/components" class="nav-item" data-page="components">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>
      Components
    </a>
    <a href="#/design-systems" class="nav-item" data-page="design-systems">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg></span>
      Design Systems
    </a>
    <a href="#/team" class="nav-item" data-page="team">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
      Team
    </a>
    <div class="nav-footer">
      <span id="server-status">connecting...</span>
    </div>
  </nav>

  <main id="content">
    <div id="search-bar">
      <input type="text" id="global-search" placeholder="Search skills and memories..." autocomplete="off">
    </div>
    <div id="page"></div>
  </main>

  <div id="detail-panel" class="hidden">
    <div class="panel-header">
      <h2 id="detail-title"></h2>
      <button id="detail-close">&times;</button>
    </div>
    <div id="detail-content"></div>
  </div>

  <!-- Team page modals -->
  <dialog id="modal-add-member">
    <h2>Add Team Member</h2>
    <div class="form-field">
      <label>Name</label>
      <input id="input-member-name" type="text" placeholder="Marco Rossi">
    </div>
    <div class="form-field">
      <label>Email <span style="opacity:.5">(optional)</span></label>
      <input id="input-member-email" type="email" placeholder="marco@example.com">
    </div>
    <div class="form-field">
      <label>Key label</label>
      <input id="input-key-label" type="text" placeholder="Marco's laptop">
    </div>
    <div class="modal-actions">
      <button id="btn-cancel-member" class="btn-ghost">Cancel</button>
      <button id="btn-create-member" class="btn-primary">Generate Key</button>
    </div>
  </dialog>

  <dialog id="modal-edit-member">
    <h2>Edit Team Member</h2>
    <input type="hidden" id="edit-member-id">
    <div class="form-field">
      <label>Name</label>
      <input id="edit-member-name" type="text">
    </div>
    <div class="form-field">
      <label>Email <span style="opacity:.5">(optional)</span></label>
      <input id="edit-member-email" type="email">
    </div>
    <div class="form-field">
      <label>Role</label>
      <select id="edit-member-role">
        <option value="member">member</option>
        <option value="admin">admin</option>
      </select>
    </div>
    <div class="modal-actions">
      <button id="btn-cancel-edit-member" class="btn-ghost">Cancel</button>
      <button id="btn-save-edit-member" class="btn-primary">Save</button>
    </div>
  </dialog>

  <dialog id="modal-show-key">
    <h2>New API Key</h2>
    <p>Copy this key now — it won't be shown again.</p>
    <code id="new-key-value" class="key-display"></code>
    <div class="modal-actions">
      <button id="btn-copy-key" class="btn-ghost">Copy</button>
      <button id="btn-close-key-modal" class="btn-primary">Done</button>
    </div>
    <details>
      <summary>How to connect</summary>
      <pre id="connection-snippet"></pre>
    </details>
  </dialog>

  <script type="module" src="/app.js"></script>
</body>
</html>
