version: '3.8'

services:
  codegraph:
    build: .
    container_name: codegraph-dashboard
    ports:
      - '3737:3737'
    volumes:
      - codegraph-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3737
      - SKILLBRAIN_ROOT=/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3737/api/health']
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  codegraph-data:
